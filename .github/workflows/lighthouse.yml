name: Lighthouse CI

on:
  pull_request:
    branches:
      - main

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Scalingo review app
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'deploy/sclng: infomedicament-staging-pr${{ github.event.pull_request.number }}'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://infomedicament-staging-pr${{ github.event.pull_request.number }}.osc-fr1.scalingo.io/
            https://infomedicament-staging-pr${{ github.event.pull_request.number }}.osc-fr1.scalingo.io/medicaments/60234100
          uploadArtifacts: true
          temporaryPublicStorage: true
